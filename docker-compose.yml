name: alvolant

services:
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "${BFF_BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-8000}:8000"
    environment:
      BFF_API_KEY: ""
      BFF_API_KEY_FILE: "/run/secrets/bff_api_key"
      RATE_LIMIT_HASH_KEY: ""
      RATE_LIMIT_HASH_KEY_FILE: "/run/secrets/rate_limit_hash_key"
      TOMTOM_API_KEY: ""
      # Optional provider credentials are mounted only when their source
      # variable is non-empty. A local quick start can therefore omit them
      # without making the BFF fail while reading an empty secret file.
      TOMTOM_API_KEY_FILE: "${TOMTOM_API_KEY:+/run/secrets/tomtom_api_key}"
      ARCGIS_API_KEY: ""
      ARCGIS_API_KEY_FILE: "${ARCGIS_API_KEY:+/run/secrets/arcgis_api_key}"
      TMB_APP_ID: ""
      TMB_APP_ID_FILE: "${TMB_APP_ID:+/run/secrets/tmb_app_id}"
      TMB_APP_KEY: ""
      TMB_APP_KEY_FILE: "${TMB_APP_KEY:+/run/secrets/tmb_app_key}"
      REDIS_URL: ""
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_USERNAME: "alvolant"
      REDIS_PASSWORD_FILE: "/run/secrets/redis_password"
      REDIS_USE_TLS: "false"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DOCS_ENABLED: "${DOCS_ENABLED:-false}"
      TRUSTED_HOSTS: "${TRUSTED_HOSTS:-localhost,127.0.0.1}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      OUTBOUND_ALLOWED_HOSTS: "${OUTBOUND_ALLOWED_HOSTS:-t-mobilitat.atm.cat,t-mobilitat.cat,api.tomtom.com,api.tmb.cat,www.ambmobilitat.cat,ibasemaps-api.arcgis.com}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"
      RATE_LIMIT_WS_MPM: "${RATE_LIMIT_WS_MPM:-120}"
      MAX_WS_CONNECTIONS: "${MAX_WS_CONNECTIONS:-200}"
      MAX_WS_CONNECTIONS_PER_IP: "${MAX_WS_CONNECTIONS_PER_IP:-20}"
      MAX_WS_TOPICS_PER_CLIENT: "${MAX_WS_TOPICS_PER_CLIENT:-20}"
      MAX_WS_MESSAGE_BYTES: "${MAX_WS_MESSAGE_BYTES:-4096}"
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-32768}"
      REQUEST_BODY_TIMEOUT_SECONDS: "${REQUEST_BODY_TIMEOUT_SECONDS:-15}"
      TRAFFIC_CACHE_TTL_SECONDS: "${TRAFFIC_CACHE_TTL_SECONDS:-900}"
      TRAFFIC_GLOBAL_REQUESTS_PER_MINUTE: "${TRAFFIC_GLOBAL_REQUESTS_PER_MINUTE:-120}"
      TRAFFIC_GLOBAL_REQUESTS_PER_DAY: "${TRAFFIC_GLOBAL_REQUESTS_PER_DAY:-2300}"
      TRAFFIC_PROVIDER_CIRCUIT_SECONDS: "${TRAFFIC_PROVIDER_CIRCUIT_SECONDS:-60}"
      TMB_API_BASE_URL: "${TMB_API_BASE_URL:-https://api.tmb.cat/v1}"
      TMB_IBUS_CACHE_TTL_SECONDS: "${TMB_IBUS_CACHE_TTL_SECONDS:-30}"
      TMB_IBUS_ROUTE_SCAN_MAX_STOPS: "${TMB_IBUS_ROUTE_SCAN_MAX_STOPS:-16}"
      TMB_IBUS_ROUTE_SCAN_TTL_SECONDS: "${TMB_IBUS_ROUTE_SCAN_TTL_SECONDS:-120}"
      TMB_IBUS_STOP_STRIDE: "${TMB_IBUS_STOP_STRIDE:-2}"
      TMB_IBUS_GLOBAL_REQUESTS_PER_MINUTE: "${TMB_IBUS_GLOBAL_REQUESTS_PER_MINUTE:-60}"
      TMB_IBUS_GLOBAL_REQUESTS_PER_DAY: "${TMB_IBUS_GLOBAL_REQUESTS_PER_DAY:-15000}"
      TMB_IBUS_PROVIDER_CIRCUIT_SECONDS: "${TMB_IBUS_PROVIDER_CIRCUIT_SECONDS:-60}"
      SATELLITE_TILES_ENABLED: "${SATELLITE_TILES_ENABLED:-true}"
      SATELLITE_TILE_CACHE_TTL_SECONDS: "${SATELLITE_TILE_CACHE_TTL_SECONDS:-86400}"
      SATELLITE_TILE_CACHE_ENTRIES: "${SATELLITE_TILE_CACHE_ENTRIES:-512}"
      SATELLITE_GLOBAL_REQUESTS_PER_MINUTE: "${SATELLITE_GLOBAL_REQUESTS_PER_MINUTE:-600}"
      SATELLITE_GLOBAL_REQUESTS_PER_DAY: "${SATELLITE_GLOBAL_REQUESTS_PER_DAY:-50000}"
      SATELLITE_CLIENT_REQUESTS_PER_MINUTE: "${SATELLITE_CLIENT_REQUESTS_PER_MINUTE:-300}"
      SATELLITE_CLIENT_REQUESTS_PER_DAY: "${SATELLITE_CLIENT_REQUESTS_PER_DAY:-3000}"
      SATELLITE_IP_REQUESTS_PER_MINUTE: "${SATELLITE_IP_REQUESTS_PER_MINUTE:-600}"
      SATELLITE_IP_REQUESTS_PER_DAY: "${SATELLITE_IP_REQUESTS_PER_DAY:-6000}"
      SATELLITE_PROVIDER_CIRCUIT_SECONDS: "${SATELLITE_PROVIDER_CIRCUIT_SECONDS:-3600}"
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-true}"
      TELEMETRY_RETENTION_DAYS: "${TELEMETRY_RETENTION_DAYS:-3}"
      TELEMETRY_MAX_EVENTS_PER_DAY: "${TELEMETRY_MAX_EVENTS_PER_DAY:-5000}"
      TELEMETRY_MAX_ERRORS_PER_DAY: "${TELEMETRY_MAX_ERRORS_PER_DAY:-500}"
      TELEMETRY_QUEUE_SIZE: "${TELEMETRY_QUEUE_SIZE:-2048}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    secrets:
      - bff_api_key
      - rate_limit_hash_key
      - tomtom_api_key
      - arcgis_api_key
      - tmb_app_id
      - tmb_app_key
      - redis_password
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - gtfs-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: "${BFF_MEMORY_LIMIT:-3g}"
    cpus: 1.5
    stop_grace_period: 35s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read(1)"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - cache
      - egress

  # The regular light and dark basemaps are fully local in the development
  # stack. run-local.sh builds the PMTiles archive from public OSM data once,
  # then mounts it read-only here. Neither service needs the public BFF or a
  # personal DNS name.
  maps:
    image: ghcr.io/maplibre/martin:1.12.0@sha256:6cb9f6fbe3f3aa9d76841120ac02ba562037bd2d303f38a93e80764298a0d21f
    init: true
    command:
      - --config
      - /etc/martin/config.yaml
    volumes:
      - ./maps/martin.local.yaml:/etc/martin/config.yaml:ro
      - ${LOCAL_MAP_DATA_DIR:-./.alvolant/maps}/tiles:/data/tiles:ro
      - ./maps/assets/fonts:/data/fonts:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    networks:
      - maps

  map-gateway:
    image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    init: true
    ports:
      - "127.0.0.1:${LOCAL_MAP_PORT:-3002}:8080"
    volumes:
      - ./maps/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LOCAL_MAP_DATA_DIR:-./.alvolant/maps}/styles:/usr/share/nginx/html/maps/styles:ro
    depends_on:
      - maps
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=16m,mode=1777
      - /var/run:rw,noexec,nosuid,nodev,size=4m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped
    networks:
      - maps

  redis:
    image: redis:7.4.9-alpine3.21@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    user: redis
    secrets:
      - redis_password
    command:
      - /bin/sh
      - -ec
      - |
        password="$$(cat /run/secrets/redis_password)"
        test "$${#password}" -ge 32
        test "$${#password}" -le 512
        case "$${password}" in *[!A-Za-z0-9_-]*) exit 1 ;; esac
        umask 077
        printf '%s\n' \
          'user default off' \
          "user alvolant on >$${password} ~gtfs:* ~atm_rt:* ~telemetry:* ~traffic:* ~ibus:* ~rl:* &channel:* +@read +@write +@connection +multi +exec +discard +watch +unwatch +publish -keys -flushall -flushdb -config -acl -shutdown -module -debug -save -bgsave -bgrewriteaof -migrate -replicaof -slaveof -restore" \
          > /tmp/users.acl
        exec redis-server \
          --aclfile /tmp/users.acl \
          --maxmemory "${REDIS_MAXMEMORY:-1gb}" \
          --maxmemory-policy noeviction \
          --appendonly yes \
          --appendfsync everysec \
          --aof-use-rdb-preamble yes \
          --auto-aof-rewrite-percentage 100 \
          --auto-aof-rewrite-min-size 64mb \
          --save ""
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
    healthcheck:
      test:
        - CMD-SHELL
        - 'REDISCLI_AUTH="$$(cat /run/secrets/redis_password)" redis-cli --user alvolant ping | grep -q "^PONG$$"'
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: "${REDIS_MEMORY_LIMIT:-1536m}"
    cpus: 0.5
    stop_grace_period: 20s
    restart: unless-stopped
    networks:
      - cache

volumes:
  gtfs-data:
  redis-data:

networks:
  # Redis is reachable only from the BFF and is never published on the host.
  cache:
    internal: true
  # The BFF also needs outbound access to the transport and traffic providers.
  egress:
  # The local vector map server has no Internet access. It is exposed only on
  # host loopback through map-gateway for the iPhone Simulator.
  maps:
    internal: true

secrets:
  # Compose reads this from the host environment and mounts it as a runtime
  # secret file; it is not copied into the image or exposed to the BFF env.
  redis_password:
    environment: REDIS_PASSWORD
  bff_api_key:
    environment: BFF_API_KEY
  rate_limit_hash_key:
    environment: RATE_LIMIT_HASH_KEY
  tomtom_api_key:
    environment: TOMTOM_API_KEY
  arcgis_api_key:
    environment: ARCGIS_API_KEY
  tmb_app_id:
    environment: TMB_APP_ID
  tmb_app_key:
    environment: TMB_APP_KEY
