# ==============================================================================
# Route-TMB BFF — Local Development Stack
# ==============================================================================
# Usage:
#   docker-compose up        → start app + Redis
#   docker-compose up -d     → start in background
#   docker-compose down -v   → stop and remove volumes
# ==============================================================================

services:
  # --- BFF Application ---
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: route-tmb-bff
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - gtfs-data:/app/data
    restart: unless-stopped
    networks:
      - bff-network

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: route-tmb-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - bff-network

volumes:
  gtfs-data:
    driver: local
  redis-data:
    driver: local

networks:
  bff-network:
    driver: bridge
