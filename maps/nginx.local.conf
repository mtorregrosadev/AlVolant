server {
    listen 8080;
    server_name _;
    server_tokens off;
    autoindex off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Generated copies of the versioned style templates and their sprite PNGs.
    # The origin placeholder is replaced by run-local.sh before Compose starts.
    location /maps/styles/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Strip only the public prefix. Martin's base_path restores it in its
    # TileJSON response so MapLibre keeps requesting this loopback gateway.
    location /maps/tiles/ {
        proxy_pass http://maps:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        return 404;
    }
}
